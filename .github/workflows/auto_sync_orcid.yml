name: Auto-Sync ORCID Publications

on:
  schedule:
    # Runs daily at 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-orcid:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Fetch and Sync Publications from ORCID API
        run: |
          python scripts/sync_orcid.py

      - name: Commit and Push Updated Publications
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add publications.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "[Auto-Sync] Update publications from ORCID API" && git push origin main)
